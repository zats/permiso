name: PermisoSample
options:
  deploymentTarget:
    macOS: "26.0"
packages:
  Permiso:
    path: ..
targets:
  PermisoSample:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - PermisoSample
    resources:
      - PermisoSample/AppIcon.icns
    info:
      path: PermisoSample/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.zats.PermisoSample
        PRODUCT_NAME: Permiso Sample
        SWIFT_VERSION: 6.0
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
    dependencies:
      - package: Permiso
        product: Permiso
